<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Caesar Cipher</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Caesar Cipher 🔐</h1>
<p>Shift each letter by a fixed number (key).</p>

<textarea id="text" placeholder="Enter text"></textarea>
<input type="number" id="key" placeholder="Enter shift number">
<button onclick="encryptCaesar()">Encrypt</button>

<p id="error"></p>
<h3>Result</h3>
<div id="result"></div>

<a href="index.html">← Back to Home</a>
</div>

<script src="crypto.js"></script>
<script>
function encryptCaesar(){
    let text=document.getElementById("text").value;
    let key=parseInt(document.getElementById("key").value);
    if(isNaN(key)){document.getElementById("error").innerText="Please enter a valid number"; return;}
    document.getElementById("result").innerText=caesar(text,key);
}
</script>
</body>

</html>
